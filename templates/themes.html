        window.onload = function() {

            function theme_chge(Id1,Id2,DIVName)
            {
                
                 debugger                                
                if(localStorage.getItem('theme01')==undefined && localStorage.getItem('theme02')==undefined && THEMES==undefined){
                  localStorage.setItem('theme01',"black")
                localStorage.setItem('theme02',"white")     
                }                
                else if(Id1!=undefined&&Id2!=undefined&&DIVName!=undefined){  
                    var ElTwoID='.'+DIVName+' #'+Id1;
                    var ElOneID ='.'+DIVName+' #'+Id2;                 
                    const el1 = document.querySelector(ElTwoID);
                    const el2 = document.querySelector(ElOneID);
                    localStorage.setItem('theme01',window.getComputedStyle(el1).backgroundColor)
                    localStorage.setItem('theme02',window.getComputedStyle(el2).backgroundColor)
                }
                document.documentElement.style.backgroundColor = localStorage.getItem('theme01');            
                // document.querySelectorAll('.BG_color').forEach(el => {el.style.backgroundColor = 
                //     localStorage.getItem('theme01')});
                document.querySelectorAll('.txt_master').forEach(el => {el.style.color = 
                    localStorage.getItem('theme02')});
               // alert(ElOneID+'='+localStorage.getItem('theme01')+','+ElTwoID+':'+localStorage.getItem('theme02'));                
            }
            function font_settings(){
                if(localStorage.getItem('font_settings')==undefined){
                    localStorage.setItem('font_settings','Times New Roman')
                }
                
                document.querySelectorAll(".txt_master").forEach(el => {
                            el.style.fontFamily = localStorage.getItem('font_settings');
                        });
            }
            function increasesizeoverall(ClassNameToReSize){
                debugger
                    var ele = document.querySelectorAll('.'+ClassNameToReSize)
                    if(localStorage.getItem('reontrustme') != undefined || localStorage.getItem('reontrustme') != null ){
                        //localStorage.setItem('reontrustme',0) 

                        var basecondition=parseInt(localStorage.getItem('reontrustme'))
                     
                    ele.forEach(el=>{
                            const elesty = window.getComputedStyle(el);
                            var width,height;
                            if(!el.classList.contains('hascontent') ){
                                width = parseFloat(elesty.width);
                            el.style.width=(width+(20*(basecondition))+(10*(basecondition)))+'px'
                           
                                height = parseFloat(elesty.height);
                            el.style.height=(height+10*(basecondition))+'px'
                            }                
                                                       
                             var classarray = el.classList
                            if(el.classList.contains('hascontent') || el.classList.contains('txt_master') ){
                            const fntsize = parseFloat(elesty.fontSize);
                                            el.style.fontSize = (fntsize+10*(basecondition))+'px';
                                             if(el.classList.contains('hascontent') && !el.classList.contains('txt_master')){
                                                el.style.margin=0;                                               
                                             }
                            }                            
                    });
                    }
                                         
            }
