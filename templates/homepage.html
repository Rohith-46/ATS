            .gauge-circle {

            .needle {

            }

            .gauge-center {
                position: absolute;
                    bottom: 45%;
                left: 50%;

        <script>
            window.onload = function() {
                theme_chge(); // call your function here
                font_settings();
                increasesizeoverall('resizeMe')
            };
            function theme_chge()
            {
                debugger
                if(localStorage.getItem('theme01')==undefined && localStorage.getItem('theme02')==undefined){
                  localStorage.setItem('theme01',"black")
                localStorage.setItem('theme02',"white")     
                }
                //debugger   
                document.documentElement.style.backgroundColor = localStorage.getItem('theme01');             
                //document.querySelectorAll('.BG_color').forEach(el => {el.style.backgroundColor = localStorage.getItem('theme01')});
                document.querySelectorAll('.txt_master').forEach(el => {el.style.color = 
                    localStorage.getItem('theme02')});
                //alert(localStorage.getItem('theme01')+','+localStorage.getItem('theme02'));                
            }
            function font_settings(){
                debugger
                if(localStorage.getItem('font_settings')==undefined){
                    localStorage.setItem('font_settings','Times New Roman')
                }
       
                document.querySelectorAll(".txt_master").forEach(el => {
                            el.style.fontFamily = localStorage.getItem('font_settings');
                        });
            }
            function increasesizeoverall(ClassNameToReSize){
                debugger
                    var ele = document.querySelectorAll('.'+ClassNameToReSize)
                    if(localStorage.getItem('reontrustme') != undefined || localStorage.getItem('reontrustme') != null ){
                        //localStorage.setItem('reontrustme',0) 

                        var basecondition=parseInt(localStorage.getItem('reontrustme'))
                     
                    ele.forEach(el=>{
                            const elesty = window.getComputedStyle(el);
                            var width,height;
                            if(!el.classList.contains('hascontent') ){
                                width = parseFloat(elesty.width);
                            el.style.width=(width+(20*(basecondition))+(10*(basecondition)))+'px'
                           
                                height = parseFloat(elesty.height);
                            el.style.height=(height+10*(basecondition))+'px'
                            }                
                                                       
                             var classarray = el.classList
                            if(el.classList.contains('hascontent') || el.classList.contains('txt_master') ){
                            const fntsize = parseFloat(elesty.fontSize);
                                            el.style.fontSize = (fntsize+10*(basecondition))+'px';
                                             if(el.classList.contains('hascontent') && !el.classList.contains('txt_master')){
                                                el.style.margin=0;                                               
                                             }
                            }                            
                    });
                    }
                                         
            }
        
            function score_label_condi(score_count){
                if(score_count >=0 && score_count <=25){
                    return "POOR"
                }
                else if (score_count >25 && score_count <=50){
                    return "BETTER"
                }
                else if (score_count >50 && score_count <=75){
                    return "AVERAGE"
                }
                else if (score_count >75 && score_count <=100){
                    return "BEST"
                }
            }
            function update_score_gauge(score_count){
                rotation = -90 + (score_count * 1.8)
                const needle = document.getElementById("needle");
                needle.style.transform = `rotate(${rotation}deg)`;
                document.getElementById("scoreValue").textContent = score_count;
            }
            
            document.addEventListener('DOMContentLoaded',function (){
            debugger
                const check_uploadform = document.getElementById('uploadForm')
                if(check_uploadform=='' || check_uploadform == undefined){
console.warn("need to load the upload file input field ")
                }
                else{
                        document.getElementById('uploadForm').addEventListener('submit',async function resume_submit(event) {
                        event.preventDefault();
                        const fileformat = document.getElementById('resumeFile')
                        const file = fileformat.files[0]
                        if (!file){
                            document.getElementById('error').textContent = 'Please provide proper resume in pdf format to scan';
                            return;
                        }
                        const filedata = new FormData();
                        filedata.append('resume',file);
                        try {
                            debugger
                            const response = await fetch('/upload',{method:'POST',body:filedata})
                            .then(response => response.json())
                            .then(data =>{
                                if (data.status == "success"){
                                    window.showAnalysisModal();
                                    analyzed_response = JSON.parse(data.message);
                                    score_count = analyzed_response.overall_score

                                    score_gauge_count = update_score_gauge(score_count)
                                    document.getElementById("scoreLabel").textContent = score_label_condi(score_count);
                                   
                                    // === Display Strengths (Array) ===
                                    const strengthsList = document.getElementById('strengths-list');
                                    if (strengthsList) {
                                        strengthsList.innerHTML = analyzed_response
                                                                                .strengths
                                                                                    .map(item => 
                                                                                            `<li>${item}</li>`
                                                                                        ).join('');
                                    }

                                    // === Display Improvements (Array) ===
                                    const improvementsList = document.getElementById('improvements-list');
                                    if (improvementsList) {
                                        improvementsList.innerHTML = analyzed_response
                                                                                .improvements
                                                                                    .map(item => 
                                                                                            `<li>${item}</li>`
                                                                                        ).join('');
                                    }8

                                    // === Display Missing Keywords (Array) ===
                                    const keywordsList = document.getElementById('missing-keywords-list');
                                    if (keywordsList) {
                                        keywordsList.innerHTML = analyzed_response
                                                                                .missing_keywords
                                                                                    .map(item => 
                                                                                            `<li>${item}</li>`
                                                                                        ).join('');
                                    }
                                }
                                else{
                                    throw new Error(`Server error: ${response.status}`);
                                    return;
                                }
                            });
                                document.getElementById('error').textContent = '';
                        } catch (error) {
                            console.error('Upload failed:', error);
                            document.getElementById('error').textContent = 'Server Error,Try after some other time';
                            document.getElementById('result').textContent = '';
                        }
                    });
                }

                const check_upload_ipbox = document.getElementById('resumeFile')
                if(check_upload_ipbox=='' || check_upload_ipbox == undefined){
                    console.warn("need to load the upload file input field ")
                }else{
                    document.getElementById('resumeFile').addEventListener("change", function(event) {
                        debugger
                        event.preventDefault();
                        const fileformat = document.getElementById('resumeFile')
                                const file = fileformat.files[0]
                                if(!file){
                                    document.getElementById("file-name-display").textContent='';
                                    return
                                }
                                document.getElementById("file-name-display").textContent=file.name;
                    });
                }

                const modal = document.getElementById('analysisModal');
                const closeBtn = document.getElementById('closeModal');
                if(check_upload_ipbox=='' || check_upload_ipbox == undefined){
                    console.warn("need to load the upload file input field ")
                }else{

                    // Close button
                    closeBtn.addEventListener('click', () => {
                        modal.style.display = 'none';
                    });

                    // Click outside to close
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) {
                            modal.style.display = 'none';
                        }
                    });

                    // Make this function globally available
                    window.showAnalysisModal = function() {
                        if (modal) {
                            modal.style.display = 'flex';
                        }
                    };
                }
            })
    </script>
