    <script>
        window.onload = function() {
            
    theme_chge(); // call your function here

};
            function theme_chge()
            {  
                debugger               
                if(localStorage.getItem('theme01')==undefined && localStorage.getItem('theme02')==undefined){
                  localStorage.setItem('theme01',"black")
                  localStorage.setItem('theme02',"white")     
                }  
                document.documentElement.style.backgroundColor = localStorage.getItem('theme01');                     
                // document.querySelectorAll('.BG_color').forEach(el => {el.style.backgroundColor = localStorage.getItem('theme01')});
                document.querySelectorAll('.txt_master').forEach(el => {el.style.color = 
                    localStorage.getItem('theme02')});
                                
            }
            function increasesizeoverall(base,ClassNameToReSize){
                debugger              
                    var ele = document.querySelectorAll('.'+ClassNameToReSize)
                    var basecondition=0 
                    if(base=='rel'){                                   
                        basecondition = parseInt(localStorage.getItem('reontrustme'))
                    }
                    else{
                        basecondition = base == 'incr' ?1:-1;                     

                        if(localStorage.getItem('reontrustme')==null){
                            localStorage.setItem('reontrustme',basecondition)
                        }
                        else{
                            let values = parseInt(localStorage.getItem('reontrustme'))
                            values += basecondition
                            localStorage.setItem('reontrustme',values)
                        }                        
                    }

                    ele.forEach(el=>{
                            const elesty = window.getComputedStyle(el);
                            var width,height;
                            if(!el.classList.contains('hascontent') ){
                                width = parseFloat(elesty.width);
                            el.style.width=(width+(20*(basecondition))+(10*(basecondition)))+'px'
                           
                                height = parseFloat(elesty.height);
                            el.style.height=(height+10*(basecondition))+'px'
                            }                
                                                       
                             var classarray = el.classList
                            if(el.classList.contains('hascontent') || el.classList.contains('txt_master') ){
                            const fntsize = parseFloat(elesty.fontSize);
                                            el.style.fontSize = (fntsize+10*(basecondition))+'px';
                                             if(el.classList.contains('hascontent') && !el.classList.contains('txt_master')){
                                                el.style.margin=0;                                               
                                             }
                            }                            
                    });                     
            }
           function font_settings() {
            debugger
            
            if(localStorage.getItem('font_settings')==undefined){
                    localStorage.setItem('font_settings','Times New Roman')
                }
                
                document.querySelectorAll(".txt_master").forEach(el => {
                             el.style.fontFamily = localStorage.getItem('font_settings');
                        });
                        debugger
                        const fontSelect = document.getElementById("fonts_types");

                        const fonts = [
                            "Times New Roman",
                            "Arial",
                            "Courier New",
                            "Georgia",
                            "Verdana",
                            "Helvetica",
                            "Tahoma",
                            "Trebuchet MS",
                            "Impact",
                            "Lucida Console"
                        ];

                        fonts.forEach(fontName => {
                            const option = document.createElement("option");
                            option.value = fontName;
                            option.textContent = fontName;
                            
                            // Apply the font style to the option
                            option.style.fontFamily = fontName;
                            
                            fontSelect.appendChild(option);
                        });

                        if ('fonts' in document) { 
                            document.fonts.forEach(fontFace => { 
                                if (fontFace.family ) { 
                                    const option = document.createElement("option"); 
                                    option.value = fontFace.family; 
                                    option.textContent = fontFace.family; 
                                    option.style.fontFamily = fontFace
                                    fontSelect.appendChild(option); 
                                } 
                            }); 
                        }
                        fontSelect.value = localStorage.getItem('font_settings');
           
                document.getElementById("fonts_types").addEventListener("change", function() {
                    var selected = this.value;
                    if(localStorage.getItem('font_settings')==undefined){
                        localStorage.setItem('font_settings','Times New Roman')
                    }
                    else{
                        localStorage.setItem('font_settings',selected)
                    }
                    document.querySelectorAll(".txt_master").forEach(el => {
                        el.style.fontFamily = localStorage.getItem('font_settings');
                    });
                });
            };
            
    </script>
